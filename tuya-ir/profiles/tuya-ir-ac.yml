name: tuya-ir-ac.v1
components:
  - id: main
    capabilities:
      - id: switch
        version: 1
      - id: airConditionerMode
        version: 1
      - id: airConditionerFanMode
        version: 1
      - id: thermostatCoolingSetpoint
        version: 1
      - id: refresh
        version: 1
    categories:
      - name: AirConditioner
preferences:
  - name: accessId
    title: Tuya Access ID
    description: Tuya IoT Cloud project Access ID
    required: true
    preferenceType: string
    definition:
      stringType: text
      minLength: 4
      maxLength: 64
      default: "your-access-id"
  - name: accessSecret
    title: Tuya Access Secret
    description: Tuya IoT Cloud project Access Secret
    required: true
    preferenceType: string
    definition:
      stringType: password
      minLength: 4
      maxLength: 64
      default: "your-access-secret"
  - name: region
    title: Data Center (us / eu / in / cn)
    description: Region of your Tuya account
    required: true
    preferenceType: string
    definition:
      stringType: text
      minLength: 2
      maxLength: 4
      default: "us"
  - name: deviceId
    title: Tuya Device ID (가상 에어컨)
    description: 22-char alphanumeric from Tuya IoT project devices
    required: true
    preferenceType: string
    definition:
      stringType: text
      minLength: 16
      maxLength: 30
      default: "0000000000000000"
